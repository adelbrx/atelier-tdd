name: CI/CD - Atelier TDD

on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: atelier-tdd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run pytest
        run: python -m pytest backend/tests

      - name: Run Behave BDD tests
        run: python -m behave

      - name: Run HTTP contract tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  cucumber-js:
    name: CucumberJS BDD tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CucumberJS
        run: npm run test:cucumber

  frontend-tests:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - backend-tests
      - cucumber-js
      - frontend-tests
    if: always()
    steps:
      - name: Check pipeline result
        run: |
          echo "backend-tests: ${{ needs.backend-tests.result }}"
          echo "cucumber-js: ${{ needs.cucumber-js.result }}"
          echo "frontend-tests: ${{ needs.frontend-tests.result }}"

          [ "${{ needs.backend-tests.result }}" = "success" ]
          [ "${{ needs.cucumber-js.result }}" = "success" ]
          [ "${{ needs.frontend-tests.result }}" = "success" ]